[pytest]
testpaths = pytis doc
python_files = test.py test_*.py *_test.py api.py
addopts =
    --doctest-glob Fields.txt
    --doctest-modules
    --ignore pytis/util/import_error_test.py
    --ignore pytis/cms
    --ignore pytis/demo/cms.py
    --ignore pytis/demo/demoweb.py
# pytis/rest is excluded from collection on Python 2 via conftest.py
# (pytest.ini cannot express version conditions; see collect_ignore_glob there).
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
